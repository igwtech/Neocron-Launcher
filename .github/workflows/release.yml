name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: launcher-linux-amd64
            binary: launcher
          - os: ubuntu-latest
            platform: linux/arm64
            artifact: launcher-linux-arm64
            binary: launcher

          # Windows (cross-compiled from Linux)
          - os: ubuntu-latest
            platform: windows/amd64
            artifact: launcher-windows-amd64.exe
            binary: launcher.exe
          - os: ubuntu-latest
            platform: windows/arm64
            artifact: launcher-windows-arm64.exe
            binary: launcher.exe

          # macOS (requires macOS runner)
          - os: macos-latest
            platform: darwin/amd64
            artifact: launcher-darwin-amd64
            binary: launcher
          - os: macos-latest
            platform: darwin/arm64
            artifact: launcher-darwin-arm64
            binary: launcher

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # --- Linux dependencies ---
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install Linux ARM64 cross-compiler
        if: runner.os == 'Linux' && matrix.platform == 'linux/arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libgtk-3-dev:arm64 \
            libwebkit2gtk-4.0-dev:arm64 \
            pkg-config

      - name: Install Windows cross-compiler (amd64)
        if: runner.os == 'Linux' && matrix.platform == 'windows/amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64

      - name: Install Windows cross-compiler (arm64)
        if: runner.os == 'Linux' && matrix.platform == 'windows/arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64

      # --- macOS dependencies ---
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install --quiet pkg-config

      # --- Build ---
      - name: Build
        run: wails build -platform ${{ matrix.platform }} -o ${{ matrix.binary }}
        env:
          CGO_ENABLED: 1

      - name: Rename binary
        run: |
          cp build/bin/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/launcher-linux-amd64/launcher-linux-amd64
            artifacts/launcher-linux-arm64/launcher-linux-arm64
            artifacts/launcher-windows-amd64.exe/launcher-windows-amd64.exe
            artifacts/launcher-windows-arm64.exe/launcher-windows-arm64.exe
            artifacts/launcher-darwin-amd64/launcher-darwin-amd64
            artifacts/launcher-darwin-arm64/launcher-darwin-arm64

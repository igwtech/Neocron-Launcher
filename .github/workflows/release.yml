name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: launcher-linux-amd64
            binary: launcher
            deps: linux

          # Linux arm64 — native arm64 runner, no cross-compilation needed
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: launcher-linux-arm64
            binary: launcher
            deps: linux

          # Windows amd64 (cross-compiled from Linux)
          - os: ubuntu-latest
            platform: windows/amd64
            artifact: launcher-windows-amd64.exe
            binary: launcher.exe
            deps: windows

          # macOS amd64 (cross-compiled from Apple Silicon runner)
          - os: macos-latest
            platform: darwin/amd64
            artifact: launcher-darwin-amd64
            binary: launcher
            deps: macos

          # macOS Apple Silicon
          - os: macos-latest
            platform: darwin/arm64
            artifact: launcher-darwin-arm64
            binary: launcher
            deps: macos

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # --- Linux dependencies ---
      - name: Install Linux build dependencies
        if: matrix.deps == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      # --- Windows cross-compilation dependencies ---
      - name: Install Windows cross-compiler
        if: matrix.deps == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64

      # --- macOS dependencies ---
      - name: Install macOS dependencies
        if: matrix.deps == 'macos'
        run: brew install --quiet pkg-config

      # --- Build ---
      # -ldflags injects the git tag into pkg/version.Version so the running
      # binary reports the same version users downloaded — surfaces in the
      # UI header, addon.log banner, and stdout startup line.
      - name: Build
        run: wails build -platform ${{ matrix.platform }} -o ${{ matrix.binary }} -nopackage -tags webkit2_41 -ldflags "-X 'launcher/pkg/version.Version=${{ github.ref_name }}'"
        env:
          CGO_ENABLED: 1

      - name: Find and copy binary
        run: |
          echo "Looking for binary..."
          find build/bin -type f | head -20
          if [ -f "build/bin/${{ matrix.binary }}" ]; then
            cp "build/bin/${{ matrix.binary }}" "${{ matrix.artifact }}"
          elif [ -d "build/bin/${{ matrix.binary }}.app" ]; then
            cp "build/bin/${{ matrix.binary }}.app/Contents/MacOS/${{ matrix.binary }}" "${{ matrix.artifact }}"
          else
            echo "ERROR: Binary not found"
            find build/ -type f -name "${{ matrix.binary }}*"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/launcher-linux-amd64/launcher-linux-amd64
            artifacts/launcher-linux-arm64/launcher-linux-arm64
            artifacts/launcher-windows-amd64.exe/launcher-windows-amd64.exe
            artifacts/launcher-darwin-amd64/launcher-darwin-amd64
            artifacts/launcher-darwin-arm64/launcher-darwin-arm64
